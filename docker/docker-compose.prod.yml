services:
  postgres:
    image: postgres:16-alpine
    container_name: agentos-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentos_password}
      POSTGRES_DB: ${POSTGRES_DB:-agentos_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentos} -d ${POSTGRES_DB:-agentos_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentos-redis-prod
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentos-qdrant-prod
    restart: always
    volumes:
      - qdrant_storage:/qdrant/storage
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: agentos-jaeger-prod
    restart: always
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  agentos_api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agentos-api-prod
    restart: always
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-agentos}:${POSTGRES_PASSWORD:-agentos_password}@postgres:5432/${POSTGRES_DB:-agentos_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - API_HOST=0.0.0.0
      - FASTEMBED_CACHE_DIR=/fastembed_cache
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc_dir
    volumes:
      - fastembed_cache:/fastembed_cache
      - prometheus_metrics:/tmp/prometheus_multiproc_dir
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  agentos_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agentos-worker-prod
    restart: always
    command: ["celery", "-A", "agentos.core.orchestrator.celery_app", "worker", "--loglevel=INFO"]
    env_file: ../.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-agentos}:${POSTGRES_PASSWORD:-agentos_password}@postgres:5432/${POSTGRES_DB:-agentos_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - FASTEMBED_CACHE_DIR=/fastembed_cache
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc_dir
    volumes:
      - fastembed_cache:/fastembed_cache
      - prometheus_metrics:/tmp/prometheus_multiproc_dir
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agentos_dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: agentos-dashboard-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_URL=http://agentos-api-prod:8000

volumes:
  postgres_data:
  redis_data:
  qdrant_storage:
  fastembed_cache:
  prometheus_metrics:
